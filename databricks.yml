# This is a Databricks asset bundle definition for sdp_v3_pipeline.
bundle:
  name: sdp_v3_pipeline
  uuid: aae208b3-90ab-4d51-8047-afc0d0143717

variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: ${workspace.current_user.short_name}
      schema: default
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/sathyarajeshpk@://gmail.com{bundle.name}/${bundle.target}
    variables:
      catalog: ${workspace.current_user.short_name}
      schema: prod
    permissions:
      - user_name: sathyarajeshpk@gmail.com
        level: CAN_MANAGE

resources:
  pipelines:
    main_dlt_pipeline:
      name: first_sdp_pipeline_dlt
      catalog: ${var.catalog}
      target: ${var.schema}
      channel: preview
      serverless: true
      libraries:
        - notebook:
            path: /Workspace/Users/sathyarajeshpk@://gmail.com

    test_dlt_pipeline:
      name: test_pipeline_dlt
      catalog: ${var.catalog}
      target: ${var.schema}
      channel: preview
      serverless: true
      libraries:
        - notebook:
            path: /Workspace/Users/sathyarajeshpk@://gmail.com Exploration 2026-06-27 21:44:36.py

  jobs:
    first_sdp_pipeline_job:
      name: first_sdp_pipeline
      email_notifications:
        on_failure:
          - sathyarajeshpk@gmail.com
      notification_settings:
        no_alert_for_skipped_runs: true
      
      schedule:
        quartz_cron_expression: "0 */50 * * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED
        
      max_concurrent_runs: 2
      tasks:
        - task_key: pipeline-task-main
          pipeline_task:
            pipeline_id: ${resources.pipelines.main_dlt_pipeline.id}
            full_refresh: true
          max_retries: 1
          min_retry_interval_millis: 100000
        - task_key: test-pipeline-task
          pipeline_task:
            pipeline_id: ${resources.pipelines.test_dlt_pipeline.id}
            full_refresh: true
          max_retries: 1
          min_retry_interval_millis: 100000
